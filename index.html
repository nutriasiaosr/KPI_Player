<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KPI Player</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }

  iframe {
    width: 100vw;
    height: 100vh;
    border: none;
  }
</style>
</head>

<body>

<iframe id="player"></iframe>

<script>
const videos = [
  "https://drive.google.com/file/d/1u6g1S_onZc0Cca-xM5ad7S0DDes2eB03/preview",
  "https://drive.google.com/file/d/1LmhIsSFAx4Cbq_XGdeea3c2ztb-_BpiY/preview"
];

let i = 0;
const player = document.getElementById("player");

// ⏱️ SET THIS BASED ON YOUR VIDEO LENGTH
const duration = 60000; // 60 seconds (change this!)

function play(){
  player.src = videos[i];
}

// loop videos
setInterval(() => {
  i = (i + 1) % videos.length;
  play();
}, duration);

// start
play();
</script>

</body>
</html>
