<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KPI Player</title>

<style>
  body { margin:0; background:black; overflow:hidden; }
  video { width:100vw; height:100vh; object-fit:cover; }
</style>
</head>

<body>

<video id="player" autoplay muted playsinline></video>

<script>
const videos = [
  "https://drive.google.com/uc?export=download&id=1t3kGIM_tmtd-MKRccBiTX35TPOPCtOHK",
  "https://drive.google.com/uc?export=download&id=1zSc_6ib6Y6hbpWB1iKteRmoPLeM6NWEX"
];

let i = 0;
const player = document.getElementById("player");

function play(){
  player.src = videos[i];
  player.load();
  player.play().catch(()=>setTimeout(()=>player.play(),2000));
}

player.onended = ()=>{
  i = (i+1) % videos.length;
  play();
};

player.onerror = ()=>{
  i = (i+1) % videos.length;
  play();
};

play();

// refresh every 4 hours
setInterval(()=>{
  location.reload();
},14400000);
</script>

</body>
</html>
