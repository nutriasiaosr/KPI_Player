<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KPI Player</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }

  iframe {
    width: 100vw;
    height: 100vh;
    border: none;
  }
</style>
</head>

<body>

<iframe id="player"></iframe>

<script>
const videos = [
  "https://onedrive.live.com/embed?resid=IQC89kn20aoyR4vNZq72ZCRWAQDo9wFGqOF_bGf5pEWicM0",
  "https://onedrive.live.com/embed?resid=IQBdMquDX3ZtTIEl02tq3_CBAd_AESPnXjWpr8JZnFgUjUY"
];

let i = 0;
const player = document.getElementById("player");

// 👉 Adjust based on your video length
const duration = 60000; // 60 seconds (change this)

function play() {
  player.src = videos[i];
}

// loop videos
setInterval(() => {
  i = (i + 1) % videos.length;
  play();
}, duration);

// start
play();
</script>

</body>
</html>
