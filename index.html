<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KPI Player</title>

<style>
  body { margin:0; background:black; overflow:hidden; }
  iframe { width:100vw; height:100vh; border:none; }
</style>
</head>

<body>

<iframe id="player"></iframe>

<script>
const videos = [
  "https://drive.google.com/file/d/1t3kGIM_tmtd-MKRccBiTX35TPOPCtOHK/preview",
  "https://drive.google.com/file/d/1zSc_6ib6Y6hbpWB1iKteRmoPLeM6NWEX/preview"
];

let i = 0;
const player = document.getElementById("player");

// adjust time depending on your video length
const duration = 60000; // 1 minute

function play(){
  player.src = videos[i];
}

setInterval(()=>{
  i = (i+1) % videos.length;
  play();
}, duration);

play();
</script>

</body>
</html>
