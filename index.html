<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KPI Display</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }

  iframe {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    border: none;
  }
</style>
</head>

<body>

<iframe id="player"
src="https://www.youtube.com/embed/videoseries?list=PLzfMwpUS2RQEc7xqSujg65dFh0S3luYHk&autoplay=1&mute=1&loop=1&controls=0&rel=0&modestbranding=1&playsinline=1&enablejsapi=1&iv_load_policy=3&fs=0&disablekb=1&origin=https://nutriasiaosr.github.io"
allow="autoplay; fullscreen">
</iframe>

<script>
// 🔄 Retry autoplay every 30 seconds if TV blocks it
setInterval(() => {
  let iframe = document.getElementById("player");
  iframe.src = iframe.src;
}, 30000);

// 🔄 Optional: try fullscreen (may require 1 click)
function goFullscreen() {
  let el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
}
setTimeout(goFullscreen, 2000);
</script>

</body>
</html>
